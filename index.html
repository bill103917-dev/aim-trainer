<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Aim Pro - 多人跨平台最終版</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --primary: #00ff88; --secondary: #00d4ff; --danger: #ff4444; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #000; font-family: sans-serif; color: white; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(10px); }
        .menu-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 300px; }
        input { padding: 12px; font-size: 1rem; border-radius: 8px; border: none; margin: 10px 0; width: 90%; background: #222; color: white; }
        button { padding: 12px; font-size: 1rem; background: var(--primary); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 8px 0; width: 100%; }
        .btn-blue { background: var(--secondary); }
        .btn-gray { background: #555; color: white; }
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 5; }
        .stat { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 10px; margin-bottom: 5px; border-left: 4px solid var(--primary); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid var(--primary); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #mobile-controls { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; }
        #shoot-btn { position: absolute; width: 80px; height: 80px; background: rgba(255,68,68,0.5); border: 3px solid white; border-radius: 50%; pointer-events: auto; right: 10%; bottom: 15%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="view-login" class="overlay">
        <div class="menu-box">
            <h1>AIM PRO</h1>
            <input type="text" id="username" placeholder="輸入玩家名稱">
            <button onclick="setUser('pc')">電腦版 (滑鼠)</button>
            <button onclick="setUser('mobile')" class="btn-blue">手機版 (觸控)</button>
        </div>
    </div>

    <div id="view-main" class="overlay" style="display:none">
        <div class="menu-box">
            <h2 id="greet">你好</h2>
            <button onclick="showView('view-modes')">開始遊戲</button>
            <button onclick="showView('view-settings')" class="btn-gray">設定</button>
        </div>
    </div>

    <div id="view-modes" class="overlay" style="display:none">
        <div class="menu-box">
            <h2>選擇戰場</h2>
            <button onclick="initGame('training')">單人訓練場</button>
            <button onclick="showView('view-room')" class="btn-blue">私人房間 (多人)</button>
            <button onclick="showView('view-main')" class="btn-gray">返回</button>
        </div>
    </div>

    <div id="view-room" class="overlay" style="display:none">
        <div class="menu-box">
            <h2>私人房間</h2>
            <input type="text" id="roomID" placeholder="房間名稱">
            <button onclick="initGame('multi')">進入/創建房間</button>
            <button onclick="showView('view-modes')" class="btn-gray">返回</button>
        </div>
    </div>

    <div id="view-settings" class="overlay" style="display:none">
        <div class="menu-box">
            <h2>按鍵設定</h2>
            <p>射擊鍵: <input type="text" id="keySet" readonly onclick="captureKey()"></p>
            <button onclick="showView('view-main')">儲存</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none">
        <div class="stat">玩家: <span id="ui-name"></span></div>
        <div class="stat">分數: <span id="score">0</span></div>
        <div class="stat" id="room-tag" style="display:none">房間: <span id="ui-room"></span></div>
    </div>
    <div id="crosshair" style="display:none"></div>
    <div id="mobile-controls"><div id="shoot-btn">🔥</div></div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- 設定與連線 ---
        const SERVER_URL = "https://你的後端網址.onrender.com"; // 部署後請修改此處
        let socket, scene, camera, renderer, raycaster;
        let isPaused = true, score = 0, targets = [], otherPlayers = {};
        let config = JSON.parse(localStorage.getItem('aim_pro_v2')) || { name: "", device: "pc", shootKey: "KeyE" };

        window.showView = (id) => {
            document.querySelectorAll('.overlay').forEach(v => v.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
        };

        window.setUser = (dev) => {
            const n = document.getElementById('username').value;
            if(!n) return alert("請輸入名稱");
            config.name = n; config.device = dev;
            localStorage.setItem('aim_pro_v2', JSON.stringify(config));
            document.getElementById('greet').innerText = "你好, " + n;
            showView('view-main');
        };

        window.captureKey = () => {
            window.addEventListener('keydown', (e) => {
                config.shootKey = e.code;
                document.getElementById('keySet').value = e.code;
                localStorage.setItem('aim_pro_v2', JSON.stringify(config));
            }, { once: true });
        };

        // --- 核心邏輯 ---
        function initThree() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            raycaster = new THREE.Raycaster();
            animate();
        }

        window.initGame = (type) => {
            showView('none'); isPaused = false;
            document.getElementById('ui-layer').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('ui-name').innerText = config.name;

            if(config.device === 'pc') renderer.domElement.requestPointerLock();
            else document.getElementById('mobile-controls').style.display = 'block';

            if(type === 'multi') {
                const rid = document.getElementById('roomID').value || "Lobby";
                document.getElementById('room-tag').style.display = 'block';
                document.getElementById('ui-room').innerText = rid;
                connectMulti(rid);
            } else {
                for(let i=0; i<5; i++) spawnTarget();
            }
        };

        function connectMulti(room) {
            socket = io(SERVER_URL);
            socket.emit('joinRoom', { room, name: config.name });
            socket.on('playerUpdate', (players) => {
                for(let id in players) {
                    if(id === socket.id) continue;
                    if(!otherPlayers[id]) {
                        const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0xff4444}));
                        scene.add(mesh); otherPlayers[id] = mesh;
                    }
                    otherPlayers[id].position.set(players[id].x, players[id].y, players[id].z);
                    otherPlayers[id].rotation.y = players[id].ry;
                }
            });
            socket.on('removePlayer', (id) => { scene.remove(otherPlayers[id]); delete otherPlayers[id]; });
        }

        function spawnTarget() {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({color: 0x00ff88}));
            mesh.position.set((Math.random()-0.5)*20, Math.random()*5, -10 - Math.random()*5);
            scene.add(mesh); targets.push(mesh);
        }

        const shoot = () => {
            if(isPaused) return;
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(targets);
            if(hits.length > 0) {
                scene.remove(hits[0].object);
                targets.splice(targets.indexOf(hits[0].object), 1);
                score += 10; document.getElementById('score').innerText = score;
                spawnTarget();
            }
        };

        // 操作控制
        window.addEventListener('mousemove', (e) => {
            if(isPaused || config.device !== 'pc') return;
            camera.rotation.y -= e.movementX * 0.002;
            camera.rotation.x -= e.movementY * 0.002;
            camera.rotation.x = Math.max(-1.5, 1.5, camera.rotation.x);
        });

        let tx, ty;
        window.addEventListener('touchmove', (e) => {
            if(isPaused || config.device !== 'mobile') return;
            const t = e.touches[0];
            if(tx) { camera.rotation.y -= (t.pageX - tx)*0.005; camera.rotation.x -= (t.pageY - ty)*0.005; }
            tx = t.pageX; ty = t.pageY;
        });
        window.addEventListener('touchend', () => tx = null);
        window.addEventListener('mousedown', (e) => { if(e.button===0) shoot(); });
        window.addEventListener('keydown', (e) => { if(e.code===config.shootKey) shoot(); });
        document.getElementById('shoot-btn').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

        function animate() {
            requestAnimationFrame(animate);
            if(socket && !isPaused) {
                socket.emit('move', { 
                    room: document.getElementById('ui-room').innerText,
                    x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y 
                });
            }
            renderer.render(scene, camera);
        }
        initThree();
        document.getElementById('keySet').value = config.shootKey;
        if(config.name) document.getElementById('username').value = config.name;
    </script>
</body>
</html>
