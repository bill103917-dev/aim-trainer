<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Aim Pro - 自定義環境版</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; touch-action: none; background: #000;
            font-family: sans-serif; color: white;
        }
        canvas { display: block; }

        /* UI 層 */
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none; z-index: 5;
        }
        .stat { font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        /* 暫停選單 */
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; backdrop-filter: blur(8px);
        }

        .control-panel {
            background: rgba(255,255,255,0.1); padding: 25px;
            border-radius: 15px; margin-bottom: 20px; min-width: 320px;
        }

        .setting-item { margin: 12px 0; display: flex; justify-content: space-between; align-items: center; }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 16px; height: 16px; border: 2px solid #0f0; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }

        select, input[type=range] { padding: 5px; width: 120px; border-radius: 5px; }
        button { 
            padding: 15px 60px; font-size: 1.2rem; background: #00ff88; color: #000;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat">分數: <span id="score">0</span></div>
        <div class="stat">時間: <span id="timer">60</span>s</div>
    </div>

    <div id="menu">
        <h1 style="color:#00ff88">AIM TRAINER CUSTOM</h1>
        <div class="control-panel">
            <div class="setting-item">
                <label>選擇場景背景</label>
                <select id="bgSelect">
                    <option value="0x050505">極致黑 (專業)</option>
                    <option value="0x87ceeb">天空藍 (明亮)</option>
                    <option value="0x2d5a27">森林綠 (舒適)</option>
                    <option value="0x1a1a2e">星空藍 (科幻)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>滑鼠靈敏度</label>
                <input type="range" id="sensInput" min="1" max="30" value="8">
            </div>
            <div class="setting-item">
                <label>目標大小</label>
                <input type="range" id="sizeInput" min="2" max="15" value="6">
            </div>
        </div>
        <button id="startBtn">確認並開始</button>
    </div>
    
    <div id="crosshair"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. 初始化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 燈光強化 (讓畫面不再昏暗)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // 提升整體亮度
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 15, 10);
        scene.add(sunLight);

        // --- 2. 遊戲狀態 ---
        let isPaused = true;
        let score = 0;
        let timeLeft = 60;
        let sensitivity = 0.008;
        let targetSize = 0.6;
        const targets = [];
        const raycaster = new THREE.Raycaster();

        // UI 綁定
        const menu = document.getElementById('menu');
        const bgSelect = document.getElementById('bgSelect');
        const sensInput = document.getElementById('sensInput');
        const sizeInput = document.getElementById('sizeInput');

        // 設定初始背景
        scene.background = new THREE.Color(0x050505);

        // --- 3. 功能更新 ---
        bgSelect.addEventListener('change', (e) => {
            scene.background.setHex(parseInt(e.target.value));
        });

        sensInput.addEventListener('input', (e) => {
            sensitivity = e.target.value * 0.001;
        });

        sizeInput.addEventListener('input', (e) => {
            targetSize = e.target.value / 10;
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            isPaused = false;
            menu.style.display = 'none';
            score = 0; timeLeft = 60;
            document.getElementById('score').innerText = score;
            targets.forEach(t => scene.remove(t));
            targets.length = 0;
            for(let i=0; i<6; i++) spawnTarget();
        });

        // --- 4. 操作 ---
        window.addEventListener('mousemove', (e) => {
            if (isPaused) return;
            camera.rotation.y -= (e.movementX || 0) * sensitivity;
            camera.rotation.x -= (e.movementY || 0) * sensitivity;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
        });

        const shoot = () => {
            if (isPaused) return;
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(targets);
            if (hits.length > 0) {
                scene.remove(hits[0].object);
                targets.splice(targets.indexOf(hits[0].object), 1);
                score += 10;
                document.getElementById('score').innerText = score;
                spawnTarget();
            }
        };

        window.addEventListener('mousedown', (e) => { if(e.button === 0) shoot(); });
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyE') shoot();
            if (e.key === 'Escape') { isPaused = true; menu.style.display = 'flex'; }
        });

        // --- 5. 目標生成 ---
        function spawnTarget() {
            const geometry = new THREE.SphereGeometry(targetSize, 32, 32);
            // 讓標靶顏色更鮮豔
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xff0055, 
                emissive: 0x550000,
                roughness: 0.1
            });
            const mesh = new THREE.Mesh(geometry, material);
            const dist = 12 + Math.random() * 8;
            const ay = (Math.random() - 0.5) * Math.PI * 1.5;
            const ax = (Math.random() - 0.5) * Math.PI * 0.4;
            mesh.position.set(Math.sin(ay)*dist, Math.sin(ax)*dist + 2, -Math.cos(ay)*dist);
            scene.add(mesh);
            targets.push(mesh);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            if (!isPaused) {
                // 每秒倒數
                const sec = 60 - Math.floor(time / 1000) % 60;
                if (timeLeft !== sec) {
                    timeLeft = sec;
                    document.getElementById('timer').innerText = timeLeft;
                }
            }
            renderer.render(scene, camera);
        }
        animate(0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
