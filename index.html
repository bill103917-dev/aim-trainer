<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Aim Trainer - Pro Edition</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; touch-action: none; background: #000;
            font-family: sans-serif;
        }
        canvas { display: block; }
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 16px; height: 16px; border: 2px solid #0f0; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 2px; height: 2px; background: #0f0; transform: translate(-50%, -50%);
        }
        button { 
            padding: 15px 40px; font-size: 1.2rem; background: #22c55e; border: none; 
            border-radius: 8px; color: white; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>3D 準度練習</h1>
        <p>移動滑鼠控制視角</p>
        <p>【左鍵】或【E】射擊 / 【Esc】暫停</p>
        <button id="startBtn">開始練習</button>
    </div>
    
    <div id="crosshair"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 場景設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 燈光
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));
        scene.add(new THREE.GridHelper(100, 50, 0x222222, 0x111111));

        // --- 變數 ---
        let isPaused = true;
        const targets = [];
        const raycaster = new THREE.Raycaster();
        const menu = document.getElementById('menu');
        const startBtn = document.getElementById('startBtn');

        // --- 核心功能：射擊 ---
        function shoot() {
            if (isPaused) return;
            const center = new THREE.Vector2(0, 0); 
            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObjects(targets);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                scene.remove(hit);
                targets.splice(targets.indexOf(hit), 1);
                spawnTarget();
            }
        }

        // --- 輸入監聽 ---
        startBtn.addEventListener('click', () => {
            isPaused = false;
            menu.style.display = 'none';
        });

        // 監聽鍵盤 (E 射擊, Esc 暫停)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyE') shoot();
            if (e.key === 'Escape') {
                isPaused = true;
                menu.style.display = 'flex';
            }
        });

        // 監聽滑鼠左鍵射擊
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) shoot(); // 0 是左鍵
        });

        // 監聽滑鼠感應移動 (不需要按住)
        window.addEventListener('mousemove', (e) => {
            if (!isPaused) {
                const sensitivity = 0.003;
                // 使用 e.movement 獲取相對移動量
                const movementX = e.movementX || 0;
                const movementY = e.movementY || 0;

                camera.rotation.y -= movementX * sensitivity;
                camera.rotation.x -= movementY * sensitivity;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- 標靶系統 ---
        function spawnTarget() {
            const geometry = new THREE.IcosahedronGeometry(0.5, 0); // 更有稜角的目標
            const material = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x440000 });
            const mesh = new THREE.Mesh(geometry, material);
            
            const dist = 15;
            const angle = (Math.random() - 0.5) * Math.PI;
            mesh.position.set(Math.sin(angle)*dist, Math.random()*8, -Math.cos(angle)*dist);
            
            scene.add(mesh);
            targets.push(mesh);
        }

        for(let i=0; i<8; i++) spawnTarget();

        // --- 渲染 ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
